name: Bug report
description: Something is broken (English or Japanese welcome)
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: Include the method you called and the response (`ok` / `error`). Never paste tokens.
      placeholder: "slack.chat.postMessage({...}) returned { ok: false, error: '...' }"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: GASlacker version
      placeholder: v1.2.1 / library version 7
    validations:
      required: true
