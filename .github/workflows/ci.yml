name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Runs lint / typecheck / test / vite build together
      - run: pnpm run build
      # dist/ is committed as the distributable, so ensure it stays in sync with src/
      # (git status catches both uncommitted changes and new files)
      - name: Check dist is in sync with src
        run: |
          if [ -n "$(git status --porcelain dist)" ]; then
            git status --porcelain dist
            echo "dist/ is out of sync. Run 'pnpm run build' and commit dist/." >&2
            exit 1
          fi
