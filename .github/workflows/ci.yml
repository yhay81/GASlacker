name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # lint / typecheck / test / vite build をまとめて実行する
      - run: pnpm run build
      # dist/ は配布物としてコミットするため、src/ と同期していることを保証する
      # (git status で未コミットの変更・新規ファイルの両方を検出する)
      - name: Check dist is in sync with src
        run: |
          if [ -n "$(git status --porcelain dist)" ]; then
            git status --porcelain dist
            echo "dist/ is out of sync. Run 'pnpm run build' and commit dist/." >&2
            exit 1
          fi
